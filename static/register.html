<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Game Library Tracker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="scanline"></div>
  <main class="shell auth-shell">
    <section class="auth-screen">
      <div class="auth-copy">
        <p class="eyebrow">NEW PLAYER</p>
        <h1>Create Save File</h1>
        <div class="pixel-hero alt" aria-hidden="true"></div>
      </div>

      <section class="panel auth-card">
        <div class="section-title">
          <span class="pixel-icon" aria-hidden="true"></span>
          <h2>Register</h2>
        </div>
        <form class="form" id="registerForm">
          <label>
            Username
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="new-password" required>
          </label>
          <button class="primary" type="submit">Create Player</button>
        </form>
        <p class="message" id="authMessage" role="status"></p>
        <a class="text-link" href="/login/">Already have a save file?</a>
      </section>
    </section>
  </main>
  <script src="/static/auth.js"></script>
</body>
</html>
